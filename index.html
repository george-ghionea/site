<!DOCTYPE html>
<html lang="en-US">
<head>
  <title>Enterprise Software Architecture</title>
  <link rel="icon" href="img/Favicon2.png" sizes="any">
  <style>
    body {
     background-image: url("img/backround2.jpg");
     font-family: "verdana";
     font-size: 14px;
     color: #000000;
     <!--table, th, td {border:1px solid #000000; border-collapse: collapse;}--> 
     table, th, td {} 
	}
	.mirror {
    border-collapse: collapse;
    background-color: #d9d9d9;
    padding: 2px;
    width:65px;
    }
   .button {
    border: none;
    color: #ffffff; /* white */
    padding: 3px 16px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 15px;
    margin: 4px 2px;
    cursor: pointer;
    }
   .button1 {background-color: #0066cc;} /* blue */
   .button2 {background-color: #d9d9d9;} /* light gray */	
   .button3 {background-color: #800060;} /* light red */
   .button4 {background-color: #ffffff;} /* yellow ffff66 white ffffff*/
   .container{
      display: inline-block;
    }
   .typed-out{
      overflow: hidden;     
      white-space: nowrap;  
      animation: typing 3s steps(26, end) forwards;
	  font-weight: normal;
	  /*font-size: 16px;*/
    }
    @keyframes typing {
      from {background-color: #800060;}  
      to {background-color: #ffffff;}    
      from {width: 0;}
      to {width: 323px} 
    } 
  </style>
</head>
<body>
  <button class="button button1" onclick="pickColor('#000000')">default color</button> 
  <button class="button button1" onclick="pickColor('#0000cc')">color 1</button> 
  <button class="button button1" onclick="pickColor('#cc0000')">color 2</button> 
  <button class="button button1" onclick="zoomInOut('125%')">zoom 125%</button>
  <button class="button button1" onclick="zoomInOut('100%')">zoom 100%</button>
  <table >
  <tr style="height:120px">
    <td>
	  <img src="img/george2.jpg" title="George Ghionea - Photo 1" width="180px" height="120px">&nbsp;&nbsp;
	</td>
    <td align ="left"> 
	  <h3>
	  George Ghionea
	  <br>
      Enterprise Software Architecture
	  <br>
      <button class="button button4"><a href="https://gghionea.my.canva.site/contact" target="_parent">Contact</a></button>
      <button class="button button4"><a href="https://gghionea.my.canva.site/services" target="_parent">Services Offering</a></button>	 
	  <button class="button button4"><a href="about.html">About</a></button><br>	  
	  <button class="button button3" onclick ="fillAlert('ais')">AI Studio</button> 
	  <button class="button button3" onclick ="fillAlert('gem')">Gemini</button>
	  <button class="button button3" onclick ="fillAlert('git')">GitHub</button><br>
	  <div class="container">
        <div class="typed-out">Think, Build, Share, Collaborate</div>
      </div>  
	  </h3>
    </td>
  </tr>
  </table>  

  <p>
    © George Ghionea - <span id="year"></span> 
    - hosted on <a><strong>GitHub</strong></a>
    <br>
  </p>
  <script>
    (function () {
      var yEl = document.getElementById('year');
      if (yEl) yEl.textContent = new Date().getFullYear();
    })();
  </script>
  <p id="time1"></p>
  <p id="time"></p> 
  <script>
    const d1 = new Date();
	const d = new Date();
	document.getElementById("time1").innerHTML = d1;
	document.getElementById("time").innerHTML = "locale time : "+d.toLocaleString();
  </script>
  <script>
   function zoomInOut(myZoom) {
   document.body.style.zoom = myZoom;
   document.getElementById("yourchoice").innerHTML = "zoom"+"<br>"+myZoom;
   }
   function pickColor(myColor) {
   document.body.style.color = myColor;
   document.getElementById("yourchoice").innerHTML = "color"+"<br>"+myColor;
   }
  </script>
  <script>
   function fillAlert(varAlert){
    let textAlert;
    if (varAlert == 'git') {
      textAlert = alert(' ➠ You are there !');
    } else {
      textAlert = alert(' ➠ Think, Build, Share, Collaborate.\n ➠ Questions ?\n ➠ Contact me !');
    }
    document.getElementById("text").innerHTML = textAlert;
  }
  </script> 
  <div class="mirror">
    <center><p id="yourchoice"></p></center>
  </div>
</body>
</html>
